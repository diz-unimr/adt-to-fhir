extensions:
  zpages:
    endpoint: 0.0.0.0:55679

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:

exporters:
  debug:
    verbosity: normal

service:
  extensions: [zpages]

  pipelines:
    metrics:
      receivers: [otlp]
      exporters: [debug]
